<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <style>
    .board{fill:#252525;stroke:#111;stroke-width:8}.box{fill:#eee;stroke:#333;stroke-width:3}.safe{fill:#f4d7d7;stroke:#8a2222;stroke-width:3}.optic{fill:#d7e8f4;stroke:#225d8a;stroke-width:3}.logic{fill:#dff0d8;stroke:#3c763d;stroke-width:3}.text{font-family:Arial,sans-serif;font-size:22px;fill:#111;text-anchor:middle}.small{font-family:Arial,sans-serif;font-size:17px;fill:#111;text-anchor:middle}.title{font-family:Arial,sans-serif;font-size:28px;fill:#fff;text-anchor:middle}.arrow{stroke:#fff;stroke-width:5;marker-end:url(#m)}
  </style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#fff"/></marker></defs>
  <rect class="board" x="20" y="20" width="1160" height="560" rx="12"/><text class="title" x="600" y="55">Planche 600 × 300 mm, vue de dessus</text>
  <rect class="safe" x="60" y="80" width="250" height="120" rx="10"/><text class="text" x="185" y="125">Alimentation galvo</text><text class="small" x="185" y="160">et drivers X/Y sous capot</text>
  <rect class="optic" x="735" y="85" width="165" height="105" rx="10"/><text class="text" x="817" y="125">Laser 12 mm</text><text class="small" x="817" y="160">support réglable</text>
  <rect class="optic" x="930" y="75" width="190" height="135" rx="10"/><text class="text" x="1025" y="120">Bloc galvo XY</text><text class="small" x="1025" y="155">support métallique du kit</text><line class="arrow" x1="1025" y1="210" x2="1025" y2="320"/><text class="title" x="1030" y="350">faisceaux vers le haut</text>
  <rect class="optic" x="850" y="260" width="170" height="90" rx="10"/><text class="text" x="935" y="300">OPT101</text><text class="small" x="935" y="330">tube noir orientable</text>
  <rect class="optic" x="65" y="250" width="185" height="150" rx="10"/><text class="text" x="157" y="295">Zone octave</text><text class="text" x="157" y="330">VL53L4CD</text><text class="small" x="157" y="365">sur équerre verticale</text>
  <rect class="safe" x="65" y="460" width="135" height="75" rx="10"/><text class="text" x="132" y="505">E-stop</text><rect class="box" x="225" y="460" width="110" height="75" rx="10"/><text class="text" x="280" y="505">ARM</text>
  <rect class="logic" x="380" y="440" width="170" height="105" rx="10"/><text class="text" x="465" y="485">Teensy 4.0</text><text class="small" x="465" y="520">USB vers ordinateur</text><rect class="logic" x="580" y="440" width="135" height="105" rx="10"/><text class="text" x="647" y="485">MCP4822</text><text class="small" x="647" y="520">DAC SPI</text><rect class="logic" x="745" y="440" width="180" height="105" rx="10"/><text class="text" x="835" y="480">Offset / gain</text><text class="small" x="835" y="515">vers driver X</text>
  <text class="title" x="600" y="575">Joueur / bord avant</text>
</svg>
